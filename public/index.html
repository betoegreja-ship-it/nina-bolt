<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Bolt 🤖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
      border-bottom: 1px solid #2d2d42;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; color: #a78bfa; }
    header span { font-size: 13px; color: #64748b; margin-left: auto; }

    /* Config bar */
    #config {
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d42;
      padding: 10px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    #config label { font-size: 12px; color: #64748b; }
    #config input, #config select {
      background: #0f0f1a;
      border: 1px solid #2d2d42;
      color: #e2e8f0;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    #config input:focus { border-color: #a78bfa; }
    #config input[type="text"] { width: 200px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      background: linear-gradient(135deg, #6d28d9, #7c3aed);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: #1e1e2e;
      border: 1px solid #2d2d42;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg .meta {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }

    .msg.assistant .meta { color: #4a5568; }

    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: #1e1e2e;
      border: 1px solid #2d2d42;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }
    .dot {
      width: 8px; height: 8px;
      background: #a78bfa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* Input area */
    #input-area {
      background: #1a1a2e;
      border-top: 1px solid #2d2d42;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2d2d42;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: #a78bfa; }
    #msg-input::placeholder { color: #4a5568; }

    #send-btn {
      background: linear-gradient(135deg, #6d28d9, #7c3aed);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      height: 48px;
    }
    #send-btn:hover { opacity: 0.9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn {
      background: #1e1e2e;
      color: #64748b;
      border: 1px solid #2d2d42;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #clear-btn:hover { color: #ef4444; border-color: #ef4444; }

    /* Welcome */
    #welcome {
      text-align: center;
      color: #4a5568;
      margin: auto;
    }
    #welcome .icon { font-size: 64px; margin-bottom: 16px; }
    #welcome h2 { font-size: 22px; color: #6b7280; margin-bottom: 8px; }
    #welcome p { font-size: 14px; }

    /* Mode badge */
    .mode-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .mode-normal { background: #1e3a5f; color: #60a5fa; }
    .mode-multi { background: #2d1b69; color: #a78bfa; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f13; }
    ::-webkit-scrollbar-thumb { background: #2d2d42; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">⚡</span>
  <h1>Claude Bolt</h1>
  <span id="mode-indicator" class="mode-badge mode-normal">Normal</span>
  <span style="margin-left:8px" id="user-label">👤 default</span>
</header>

<div id="config">
  <label>API Key:</label>
  <input type="text" id="api-key" placeholder="bolt_..." />
  <label>User ID:</label>
  <input type="text" id="user-id" id="user-id" value="web_user" style="width:120px" />
  <label>Modo:</label>
  <select id="mode">
    <option value="normal">Normal</option>
    <option value="multi">Multi-Agente</option>
  </select>
  <button id="clear-btn" onclick="clearMemory()">🗑 Limpar memória</button>
</div>

<div id="messages">
  <div id="welcome">
    <div class="icon">⚡</div>
    <h2>Claude Bolt está pronto!</h2>
    <p>Configure sua API Key acima e comece a conversar.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const modeEl = document.getElementById("mode");
  const modeIndicator = document.getElementById("mode-indicator");
  const userLabel = document.getElementById("user-label");

  // Carrega key e user salvas
  const savedKey = localStorage.getItem("nina_api_key");
  const savedUser = localStorage.getItem("nina_user_id");
  if (savedKey) document.getElementById("api-key").value = savedKey;
  if (savedUser) document.getElementById("user-id").value = savedUser;

  modeEl.addEventListener("change", () => {
    const isMulti = modeEl.value === "multi";
    modeIndicator.textContent = isMulti ? "Multi-Agente" : "Normal";
    modeIndicator.className = "mode-badge " + (isMulti ? "mode-multi" : "mode-normal");
  });

  document.getElementById("user-id").addEventListener("input", (e) => {
    userLabel.textContent = "👤 " + (e.target.value || "default");
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  function getApiKey() { return document.getElementById("api-key").value.trim(); }
  function getUserId() { return document.getElementById("user-id").value.trim() || "web_user"; }

  function addMessage(role, text, extra = "") {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `${escapeHtml(text)}${extra ? `<div class="meta">${extra}</div>` : ""}`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing")?.remove();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    const apiKey = getApiKey();
    if (apiKey) localStorage.setItem("nina_api_key", apiKey);
    localStorage.setItem("nina_user_id", getUserId());
    if (apiKey) localStorage.setItem("nina_api_key", apiKey);
    if (!text) return;
    if (!apiKey) { alert("Coloque sua API Key no campo acima!"); return; }

    addMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    const mode = modeEl.value;
    const route = mode === "multi" ? "/multiagent" : "/bolt";

    try {
      const t0 = Date.now();
      const res = await fetch(route, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "x-user-id": getUserId(),
        },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("assistant", "❌ " + data.error);
      } else {
        const duration = Date.now() - t0;
        const extra = mode === "multi"
          ? `🤖 Multi-agente · ${(duration/1000).toFixed(1)}s`
          : `⚡ ${(duration/1000).toFixed(1)}s`;
        addMessage("assistant", data.reply, extra);
      }
    } catch (err) {
      removeTyping();
      addMessage("assistant", "❌ Erro de conexão: " + err.message);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function clearMemory() {
    const apiKey = getApiKey();
    if (apiKey) localStorage.setItem("nina_api_key", apiKey);
    if (!apiKey) { alert("Coloque sua API Key!"); return; }

    await fetch("/memory", {
      method: "DELETE",
      headers: { "x-api-key": apiKey, "x-user-id": getUserId() }
    });

    messagesEl.innerHTML = `<div id="welcome" style="text-align:center;color:#4a5568;margin:auto">
      <div style="font-size:48px">🗑</div>
      <p style="margin-top:8px">Memória limpa! Nova conversa.</p>
    </div>`;
  }
</script>
</body>
</html>
