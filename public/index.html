<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina Egreja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #1a1a1a; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  #header .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #6e40c9, #e040fb); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  #header .info h2 { font-size: 16px; font-weight: 600; }
  #header .info span { font-size: 12px; color: #4caf50; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
  .msg.user { background: #6e40c9; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.nina { background: #1e1e1e; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }
  .msg.nina .name { font-size: 11px; color: #e040fb; margin-bottom: 4px; font-weight: 600; }
  .msg.typing { color: #888; font-style: italic; }
  #input-area { background: #1a1a1a; padding: 16px 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
  #input { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 24px; padding: 12px 18px; font-size: 15px; outline: none; }
  #input:focus { border-color: #6e40c9; }
  #send { background: linear-gradient(135deg, #6e40c9, #e040fb); border: none; color: #fff; border-radius: 50%; width: 44px; height: 44px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #send:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="header">
  <div class="avatar">✨</div>
  <div class="info"><h2>Nina Egreja</h2><span>● Online</span></div>
</div>
<div id="messages">
  <div class="msg nina"><div class="name">Nina</div>Olá! Sou a Nina, sua assistente pessoal. Como posso te ajudar hoje? 🚀</div>
</div>
<div id="input-area">
  <input id="input" type="text" placeholder="Mensagem para Nina..." autofocus />
  <button id="send">➤</button>
</div>
<script>
  const msgs = document.getElementById('messages');
  const input = document.getElementById('input');
  const userId = 'web_' + Math.random().toString(36).substr(2, 8);

  function addMsg(text, type) {
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    if (type === 'nina') d.innerHTML = '<div class="name">Nina</div>' + text.replace(/\n/g,'<br>');
    else d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg(text, 'user');
    const typing = addMsg('digitando...', 'nina typing');
    try {
      const res = await fetch('/bolt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, message: text })
      });
      const data = await res.json();
      typing.remove();
      addMsg(data.reply || data.error || 'Sem resposta', 'nina');
    } catch(e) {
      typing.remove();
      addMsg('Erro de conexão 😢', 'nina');
    }
  }

  document.getElementById('send').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
